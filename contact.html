<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Contact Page Specific SEO Tags -->
    <title>Contact Me | Akkhil Kapoor</title>
    <meta name="description" content="Get in touch with Akkhil Kapoor. Send a message for inquiries regarding Tally Prime, Advanced Excel, Web Development, and Graphic Designing courses.">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Header Responsive Menu Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header & Navigation (Synced Across All Pages) -->
    <header class="site-header">
        <div class="nav-container">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor" width="30" height="30">
                    <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM4.15 13.51C5.9 15.61 8.71 17 12 17s6.1-1.39 7.85-3.49L12 17.82l-7.85-4.31z"/>
                </svg>
                <span>Akkhil Portfolio</span>
            </div>
            
            <!-- Mobile Menu Toggle Button -->
            <button class="menu-toggle" id="mobileMenuBtn" aria-label="Toggle Navigation">
                <i class="fas fa-bars"></i>
            </button>

            <nav aria-label="Main Navigation" id="mainNav">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="expertise.html">Expertise</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content-padding">
        <section id="contact">
            <h2>Contact Me</h2>

            <form action="https://formsubmit.co/akkhilkapoor@gmail.com" method="POST" class="contact-form">
                <!-- FormSubmit Configuration Settings -->
                <input type="hidden" name="_next" value="https://akkhilkapoor.github.io/akkhil/thankyou.html">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="New Message from Portfolio Website">
                <input type="hidden" name="_template" value="table">

                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="email" name="Email" placeholder="Your Email" required>
                <input type="text" name="Phone" placeholder="Phone Number (Optional)">

                <select name="Course">
                    <option value="">Select Course</option>
                    <option value="Tally Prime">Tally Prime</option>
                    <option value="Advanced Excel">Advanced Excel</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Graphic Designing">Graphic Designing</option>
                    <option value="AI Tools">AI Tools</option>
                    <option value="Other">Other</option>
                </select>

                <textarea name="Message" rows="6" placeholder="Write your message here..." required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; 2026 Akkhil Kapoor. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Mobile Navigation Toggle Script -->
    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mainNav = document.getElementById('mainNav');

        mobileMenuBtn.addEventListener('click', () => {
            mainNav.classList.toggle('open');
            const icon = mobileMenuBtn.querySelector('i');
            if(mainNav.classList.contains('open')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });
    </script>
</body>
</html>
